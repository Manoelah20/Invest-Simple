name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: investsimples
          POSTGRES_USER: investsimples
          POSTGRES_PASSWORD: investsimples123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore InvestSimples.Api/InvestSimples.Api.csproj

    - name: Build
      run: dotnet build InvestSimples.Api/InvestSimples.Api.csproj --no-restore -c Release

    - name: Run tests
      run: dotnet test InvestSimples.Api.Tests/InvestSimples.Api.Tests.csproj --no-build -c Release --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: InvestSimples.Api.Tests/test-results.trx

    - name: Build Docker image
      run: docker build -t investsimples-api:${{ github.sha }} -f InvestSimples.Api/Dockerfile .

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag investsimples-api:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/investsimples-api:${{ github.sha }}
        docker tag investsimples-api:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/investsimples-api:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/investsimples-api:${{ github.sha }}
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/investsimples-api:latest